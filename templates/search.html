{% extends "base.html" %}
{% block title %}{{ t('discover') }} · {{ t('app_name') }}{% endblock %}
{% block content %}
<div class="container narrow">
  <header class="dm-page-head">
    <h1>🔍 {{ t('discover') }}</h1>
    <p class="muted">Trouve des camarades par nom, école, classe ou ville.</p>
  </header>

  <div class="yt-search-bar glass" style="margin-bottom:18px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" class="yt-search-icon">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
    </svg>
    <input type="text" id="people-search-input" placeholder="Nom, école, ville, classe…"
           autocomplete="off" maxlength="80"/>
  </div>

  <ul class="conv-list" id="people-results" aria-live="polite"></ul>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const input = document.getElementById('people-search-input');
  const out   = document.getElementById('people-results');
  let timer;

  function esc(s){ return (s || '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  async function run(q){
    try {
      const r = await fetch('/api/search/people?q=' + encodeURIComponent(q));
      const d = await r.json();
      if (!d.results.length){
        out.innerHTML = `<li class="muted" style="padding:18px;text-align:center">Aucun résultat.</li>`;
        return;
      }
      out.innerHTML = d.results.map(s => `
        <li>
          <a href="/chat/${s.id}" class="conv-row">
            <span class="conv-avatar" style="background:#7c5cff">${esc((s.username||'?')[0].toUpperCase())}</span>
            <div class="conv-meta">
              <div class="conv-top"><strong>${esc(s.username)}</strong></div>
              <div class="conv-bottom">
                <span class="conv-snippet">
                  ${esc(s.class_section || '')}${s.school_name ? ' · ' + esc(s.school_name) : ''}
                </span>
              </div>
            </div>
          </a>
        </li>`).join('');
    } catch(e){
      out.innerHTML = `<li class="muted" style="padding:18px">Erreur : ${esc(e.message)}</li>`;
    }
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => run(input.value.trim()), 250);
  });
  run('');
})();
</script>
{% endblock %}
