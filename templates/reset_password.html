{% extends "base.html" %}
{% block title %}Nouveau mot de passe · {{ t('app_name') }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card glass">
    <h1 class="auth-title">🔐 Nouveau mot de passe</h1>
    <p class="muted">Choisis un mot de passe d'au moins 4 caractères.</p>

    <form method="post" class="form" style="margin-top:18px">
      <label class="field span-2">
        <span>Nouveau mot de passe</span>
        <input type="password" name="password" required minlength="4"
               autocomplete="new-password" placeholder="••••••••"/>
      </label>
      <label class="field span-2">
        <span>Confirmer le mot de passe</span>
        <input type="password" name="confirm" required minlength="4"
               autocomplete="new-password" placeholder="••••••••"/>
      </label>
      <button type="submit" class="btn btn-primary btn-full span-2">
        Mettre à jour
      </button>
    </form>
    <p class="auth-footer">
      <a href="{{ url_for('login') }}">← {{ t('login') }}</a>
    </p>
  </div>
</div>
{% endblock %}
