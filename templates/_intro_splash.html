{# ── Cinematic intro splash (3.5s, neon D, synth audio) ──
   Plays once per session. Skippable. Fades to black, then removes itself.
   No external assets beyond the app icon — audio is synthesized via Web Audio API. #}
<div id="ssas-intro" aria-hidden="true">
  <canvas id="ssas-intro-particles"></canvas>
  <div id="ssas-intro-glow"></div>
  <img id="ssas-intro-logo"
       src="{{ url_for('static', filename='img/app_icon.png') }}"
       alt=""/>
  <button id="ssas-intro-skip" type="button" aria-label="Skip intro">
    Skip ›
  </button>
</div>

<style>
  #ssas-intro{
    position:fixed; inset:0; z-index:99999;
    background:#000; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent;
    animation: ssasIntroFadeOut .55s cubic-bezier(.4,0,.2,1) 3.0s both;
  }
  #ssas-intro.skipping{ animation: ssasIntroFadeOut .35s ease both !important; }
  @keyframes ssasIntroFadeOut{
    from{ opacity:1; }
    to{ opacity:0; visibility:hidden; }
  }
  #ssas-intro-particles{
    position:absolute; inset:0; width:100%; height:100%;
    display:block; opacity:.85;
  }
  #ssas-intro-glow{
    position:absolute; left:50%; top:50%;
    width:60vmin; height:60vmin;
    transform:translate(-50%,-50%) scale(.2);
    border-radius:50%;
    background:radial-gradient(circle, rgba(56,189,248,.55) 0%,
                                       rgba(59,130,246,.25) 35%,
                                       rgba(0,0,0,0) 70%);
    filter:blur(8px);
    animation: ssasIntroGlow 3.0s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes ssasIntroGlow{
    0%   { transform:translate(-50%,-50%) scale(.2); opacity:0; }
    35%  { transform:translate(-50%,-50%) scale(.9); opacity:.6; }
    55%  { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
    72%  { transform:translate(-50%,-50%) scale(1.15); opacity:.85; }
    100% { transform:translate(-50%,-50%) scale(1.6); opacity:0; }
  }
  #ssas-intro-logo{
    position:relative;
    width:38vmin; height:auto; max-width:280px;
    border-radius:22%;
    opacity:0;
    transform:scale(.6);
    filter: drop-shadow(0 0 0 rgba(56,189,248,0));
    animation: ssasIntroLogo 3.0s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes ssasIntroLogo{
    0%   { opacity:0; transform:scale(.6);
           filter: drop-shadow(0 0 0 rgba(56,189,248,0)) brightness(.4); }
    25%  { opacity:.4; transform:scale(.85);
           filter: drop-shadow(0 0 12px rgba(56,189,248,.3)) brightness(.7); }
    55%  { opacity:1; transform:scale(1.06);
           filter: drop-shadow(0 0 38px rgba(56,189,248,.95))
                   drop-shadow(0 0 70px rgba(59,130,246,.6)) brightness(1.25); }
    72%  { opacity:1; transform:scale(1.0);
           filter: drop-shadow(0 0 24px rgba(56,189,248,.7)) brightness(1.05); }
    100% { opacity:1; transform:scale(1.0);
           filter: drop-shadow(0 0 18px rgba(56,189,248,.55)) brightness(1); }
  }
  #ssas-intro-skip{
    position:absolute; bottom:max(24px, env(safe-area-inset-bottom));
    right:18px; z-index:1;
    background:rgba(255,255,255,.08); color:#cfe7ff;
    border:1px solid rgba(255,255,255,.18);
    padding:8px 16px; border-radius:999px;
    font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    letter-spacing:.5px; cursor:pointer;
    backdrop-filter: blur(8px);
    transition: background .2s, transform .2s;
    outline:none;
  }
  #ssas-intro-skip:hover{ background:rgba(255,255,255,.15); transform:translateY(-1px); }
  #ssas-intro-skip:active{ transform:scale(.96); }
  @media (prefers-reduced-motion: reduce){
    #ssas-intro{ animation-duration:.2s; animation-delay:.5s; }
    #ssas-intro-glow, #ssas-intro-logo{ animation-duration:.6s; }
  }
</style>

<script>
(function(){
  var root = document.getElementById('ssas-intro');
  if(!root) return;
  // Show only once per browser session
  try{
    if(sessionStorage.getItem('ssas_intro_shown')){
      root.parentNode && root.parentNode.removeChild(root);
      return;
    }
    sessionStorage.setItem('ssas_intro_shown', '1');
  }catch(e){ /* private mode — show anyway */ }

  // ── Slow-motion particles (deep space) ──
  var canvas = document.getElementById('ssas-intro-particles');
  var ctx = canvas.getContext('2d');
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    canvas.width  = window.innerWidth  * DPR;
    canvas.height = window.innerHeight * DPR;
  }
  resize();
  window.addEventListener('resize', resize, {passive:true});

  var N = 70, particles = [];
  for(var i=0;i<N;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: (Math.random()*1.6 + .3) * DPR,
      vx: (Math.random()-.5) * .15 * DPR,
      vy: (Math.random()-.5) * .15 * DPR,
      a: Math.random()*.6 + .2
    });
  }
  var raf, t0 = performance.now();
  function tick(now){
    var elapsed = now - t0;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<N;i++){
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x += canvas.width;  if(p.x>canvas.width)  p.x -= canvas.width;
      if(p.y<0) p.y += canvas.height; if(p.y>canvas.height) p.y -= canvas.height;
      // brightness pulse synced to logo glow peak (~1.6s)
      var pulse = 1 + .8 * Math.exp(-Math.pow((elapsed-1600)/400,2));
      ctx.beginPath();
      ctx.fillStyle = 'rgba(150,210,255,'+ (p.a * pulse) +')';
      ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI*2);
      ctx.fill();
    }
    if(elapsed < 3500) raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);

  // ── Synthesized startup sound (peaks at 1.6s with the logo) ──
  function playSound(){
    try{
      var AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      var ac = new AC();
      var t = ac.currentTime;
      var master = ac.createGain();
      master.gain.value = .9;
      master.connect(ac.destination);

      // 1) Whoosh — filtered noise rising
      var bufLen = ac.sampleRate * 1.6;
      var buf = ac.createBuffer(1, bufLen, ac.sampleRate);
      var data = buf.getChannelData(0);
      for(var i=0;i<bufLen;i++){
        // pink-ish noise
        data[i] = (Math.random()*2 - 1) * (1 - i/bufLen) * .8;
      }
      var noise = ac.createBufferSource(); noise.buffer = buf;
      var noiseFilter = ac.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.Q.value = 1.2;
      noiseFilter.frequency.setValueAtTime(180, t);
      noiseFilter.frequency.exponentialRampToValueAtTime(2400, t + 1.5);
      var noiseGain = ac.createGain();
      noiseGain.gain.setValueAtTime(.0001, t);
      noiseGain.gain.exponentialRampToValueAtTime(.55, t + 1.4);
      noiseGain.gain.exponentialRampToValueAtTime(.0001, t + 1.9);
      noise.connect(noiseFilter).connect(noiseGain).connect(master);
      noise.start(t); noise.stop(t + 2.0);

      // 2) Synth swell — detuned saws sweeping up, peak at 1.6s
      [0, 7, 12].forEach(function(semi, idx){
        var osc = ac.createOscillator();
        osc.type = 'sawtooth';
        var base = 110 * Math.pow(2, semi/12);
        osc.frequency.setValueAtTime(base * .5, t + .2);
        osc.frequency.exponentialRampToValueAtTime(base, t + 1.6);
        var lpf = ac.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.setValueAtTime(300, t + .2);
        lpf.frequency.exponentialRampToValueAtTime(3500, t + 1.6);
        lpf.Q.value = 6;
        var g = ac.createGain();
        g.gain.setValueAtTime(.0001, t + .2);
        g.gain.exponentialRampToValueAtTime(.18, t + 1.6);
        g.gain.exponentialRampToValueAtTime(.0001, t + 2.4);
        osc.connect(lpf).connect(g).connect(master);
        osc.start(t + .2); osc.stop(t + 2.5);
      });

      // 3) Digital chime — sparkle bell at peak (1.6s)
      [1568, 2093, 2637].forEach(function(freq, idx){
        var osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        var g = ac.createGain();
        var st = t + 1.55 + idx * .04;
        g.gain.setValueAtTime(.0001, st);
        g.gain.exponentialRampToValueAtTime(.32, st + .015);
        g.gain.exponentialRampToValueAtTime(.0001, st + 1.2);
        osc.connect(g).connect(master);
        osc.start(st); osc.stop(st + 1.3);
      });

      // Fade master at the end so it ducks under the page
      master.gain.setValueAtTime(.9, t + 2.6);
      master.gain.exponentialRampToValueAtTime(.0001, t + 3.4);
      setTimeout(function(){ try{ ac.close(); }catch(e){} }, 4200);
    }catch(e){ /* audio blocked — silent intro is fine */ }
  }

  // Browsers require a user gesture before audio. Try immediately; if it
  // fails (autoplay blocked), arm the next gesture to play it.
  var played = false;
  function tryPlay(){ if(played) return; played = true; playSound(); }
  tryPlay();
  ['pointerdown','keydown','touchstart'].forEach(function(ev){
    window.addEventListener(ev, tryPlay, {once:true, passive:true});
  });

  // ── Cleanup & skip ──
  function dismiss(quick){
    if(quick) root.classList.add('skipping');
    setTimeout(function(){
      cancelAnimationFrame(raf);
      try{ root.remove(); }catch(e){ root.style.display='none'; }
    }, quick ? 380 : 600);
  }
  document.getElementById('ssas-intro-skip').addEventListener('click', function(){
    dismiss(true);
  });
  // Auto-dismiss after the fade-out finishes
  setTimeout(function(){ dismiss(false); }, 3550);
})();
</script>
